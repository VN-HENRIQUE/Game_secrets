<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Secrets - Jogos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="logo">
          <img src="Logo.png" alt="Logo Game Secrets" />
        </div>
        <nav>
          <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="contato.html">Contato</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <h1>Categorias de Jogos</h1>
      <p class="subtitulo">
        Escolha uma categoria para ver os jogos e seus easter eggs
      </p>

      <section class="grade-categorias" id="grade-categorias">
        <!-- Os cards são gerados pelo JavaScript abaixo -->
      </section>
    </main>

    <footer>
      <p>
        <small>&copy; 2026 Game Secrets. Todos os direitos reservados.</small>
      </p>
    </footer>

    <script>
      const categorias = [
  { nome: "Aventura",     imagem: "img/imgaventura.jpg",    pagina: "jogos.html?categoria=aventura"     },
  { nome: "Shooter",      imagem: "img/imgshooter.jpg",     pagina: "jogos.html?categoria=shooter"      },
  { nome: "Mundo Aberto", imagem: "img/imgmundoaberto.jpg", pagina: "jogos.html?categoria=mundo-aberto" },
  { nome: "RPG",          imagem: "img/imgrpg.jpg",         pagina: "jogos.html?categoria=rpg"          },
  { nome: "Terror",       imagem: "img/imgterror.jpg",      pagina: "jogos.html?categoria=terror"       },
  { nome: "Plataforma",   imagem: "img/imgplataforma.jpg",  pagina: "jogos.html?categoria=plataforma"   },
];

      const grade = document.getElementById("grade-categorias");

      categorias.forEach((categoria) => {
        grade.innerHTML += `
          <a href="${categoria.pagina}" class="card-categoria">
            <img src="${categoria.imagem}" alt="${categoria.nome}" />
            <div class="card-nome">${categoria.nome}</div>
          </a>
        `;
      });
    </script>
  </body>
</html>
